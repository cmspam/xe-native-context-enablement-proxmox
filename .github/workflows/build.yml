name: build

on:
  schedule:
    - cron: '0 3 * * *'
  workflow_dispatch:
  push:
    branches: [main]
    paths:
      - 'debian/**'
      - 'ci/**'
      - '.github/workflows/build.yml'

permissions:
  contents: write

concurrency:
  group: build
  cancel-in-progress: false

defaults:
  run:
    shell: bash

jobs:
  check:
    runs-on: ubuntu-latest
    outputs:
      virgl_ver: ${{ steps.q.outputs.virgl_ver }}
      patch_sha: ${{ steps.q.outputs.patch_sha }}
      qemu_ver:  ${{ steps.q.outputs.qemu_ver }}
      tag:       ${{ steps.q.outputs.tag }}
      should_build: ${{ steps.q.outputs.should_build }}
    steps:
      - uses: actions/checkout@v4
      - id: q
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          VIRGL_VER=$(curl -fsSL "https://gitlab.freedesktop.org/api/v4/projects/virgl%2Fvirglrenderer/repository/tags?per_page=20" \
            | jq -r '.[].name' \
            | grep -E '^[0-9]+\.[0-9]+\.[0-9]+$' | head -1)
          PATCH_SHA=$(curl -fsSL "https://api.github.com/repos/cmspam/xe-native-context-enablement/commits?path=virglrenderer-xe-native-context.patch&per_page=1" \
            | jq -r '.[0].sha' | cut -c1-7)
          # Latest pve-qemu version straight from the source we build from.
          # Capture first so curl is not the head of a pipe (head -1 closing the
          # pipe early would SIGPIPE curl and trip pipefail).
          QEMU_CHANGELOG=$(curl -fsSL "https://git.proxmox.com/?p=pve-qemu.git;a=blob_plain;f=debian/changelog;hb=HEAD")
          QEMU_VER=$(printf '%s\n' "$QEMU_CHANGELOG" | sed -nE 's/^pve-qemu-kvm \(([^)]+)\).*/\1/p' | head -1)
          TAG="pve9-virgl${VIRGL_VER}+xe.${PATCH_SHA}+qemu${QEMU_VER}"

          # Rebuild when any input (virgl release, patch, or pve-qemu version)
          # changed since the last release, or when this repo's build inputs did.
          SHOULD=true
          if gh release view "$TAG" --repo "$GITHUB_REPOSITORY" >/dev/null 2>&1; then
            if [[ "${{ github.event_name }}" != "workflow_dispatch" && "${{ github.event_name }}" != "push" ]]; then
              SHOULD=false
            fi
          fi

          {
            echo "virgl_ver=$VIRGL_VER"
            echo "patch_sha=$PATCH_SHA"
            echo "qemu_ver=$QEMU_VER"
            echo "tag=$TAG"
            echo "should_build=$SHOULD"
          } >> "$GITHUB_OUTPUT"

          echo "virglrenderer: $VIRGL_VER"
          echo "patch sha:     $PATCH_SHA"
          echo "pve-qemu:      $QEMU_VER"
          echo "tag:           $TAG"
          echo "build:         $SHOULD"

  build-virgl:
    needs: check
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    container:
      image: debian:trixie
    env:
      VIRGL_VER: ${{ needs.check.outputs.virgl_ver }}
      PATCH_SHA: ${{ needs.check.outputs.patch_sha }}
    steps:
      - name: Install build prereqs
        run: |
          set -euo pipefail
          export DEBIAN_FRONTEND=noninteractive
          sed -i 's/^Components: main$/Components: main contrib non-free/' /etc/apt/sources.list.d/debian.sources
          sed -i 's/^Types: deb$/Types: deb deb-src/' /etc/apt/sources.list.d/debian.sources
          apt-get update
          apt-get install -y --no-install-recommends \
            build-essential devscripts dpkg-dev equivs quilt fakeroot \
            git ca-certificates curl wget jq

      - uses: actions/checkout@v4

      - name: Stage upstream tarball + debian/
        run: |
          set -euo pipefail
          mkdir -p /tmp/src && cd /tmp/src
          curl -fsSL "https://gitlab.freedesktop.org/virgl/virglrenderer/-/archive/virglrenderer-${VIRGL_VER}/virglrenderer-virglrenderer-${VIRGL_VER}.tar.bz2" \
            -o tmp.tar.bz2
          tar xjf tmp.tar.bz2
          mv "virglrenderer-virglrenderer-${VIRGL_VER}" "virglrenderer-${VIRGL_VER}"
          rm tmp.tar.bz2
          tar cjf "virglrenderer_${VIRGL_VER}.orig.tar.bz2" "virglrenderer-${VIRGL_VER}"
          cp -a "$GITHUB_WORKSPACE/debian" "virglrenderer-${VIRGL_VER}/debian"
          curl -fsSL "https://raw.githubusercontent.com/cmspam/xe-native-context-enablement/master/virglrenderer-xe-native-context.patch" \
            -o "virglrenderer-${VIRGL_VER}/debian/patches/0001-xe-native-context.patch"

      - name: Generate debian/changelog
        run: |
          set -euo pipefail
          cd "/tmp/src/virglrenderer-${VIRGL_VER}"
          DATE=$(date -uR)
          cat > debian/changelog <<EOF
          virglrenderer (1:${VIRGL_VER}-1+xe.${PATCH_SHA}) trixie; urgency=medium

            * Build of upstream virglrenderer ${VIRGL_VER} with xe-native-context
              patch (cmspam/xe-native-context-enablement @ ${PATCH_SHA}).
            * drm-renderers: amdgpu, panfrost, asahi, msm, i915, xe.
            * venus, video, sysprof tracing.

           -- cmspam <cmspam@users.noreply.github.com>  ${DATE}
          EOF

      - name: Install build deps
        run: |
          set -euo pipefail
          cd "/tmp/src/virglrenderer-${VIRGL_VER}"
          mk-build-deps -i -t 'apt-get -y --no-install-recommends' debian/control

      - name: Build .debs
        run: |
          set -euo pipefail
          cd "/tmp/src/virglrenderer-${VIRGL_VER}"
          dpkg-buildpackage -b -us -uc

      - name: List artifacts
        run: ls -la /tmp/src/*.deb

      - name: Upload virglrenderer .debs
        uses: actions/upload-artifact@v4
        with:
          name: debs-virgl
          path: /tmp/src/*.deb
          retention-days: 2
          if-no-files-found: error

  build-qemu:
    needs: [check, build-virgl]
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    env:
      VIRGL_VER: ${{ needs.check.outputs.virgl_ver }}
      QEMU_VER:  ${{ needs.check.outputs.qemu_ver }}
    steps:
      - uses: actions/checkout@v4

      - name: Free disk space
        run: |
          set -euo pipefail
          sudo rm -rf /usr/share/dotnet /usr/local/lib/android /opt/ghc \
            /opt/hostedtoolcache /usr/local/share/boost /usr/lib/jvm || true
          sudo docker image prune --all --force || true
          df -h /

      - name: Download virglrenderer .debs
        uses: actions/download-artifact@v4
        with:
          name: debs-virgl
          path: virgl

      - name: Build pve-qemu-kvm against patched virglrenderer
        run: |
          set -euo pipefail
          docker run --rm \
            -e VIRGL_VER="${VIRGL_VER}" \
            -v "$PWD:/host" -w /host \
            debian:trixie \
            bash /host/ci/build-qemu.sh

      - name: List artifacts
        run: ls -la out/*.deb

      - name: Upload pve-qemu .debs
        uses: actions/upload-artifact@v4
        with:
          name: debs-qemu
          path: out/*.deb
          retention-days: 2
          if-no-files-found: error

  release:
    needs: [check, build-virgl, build-qemu]
    if: needs.check.outputs.should_build == 'true'
    runs-on: ubuntu-latest
    env:
      VIRGL_VER: ${{ needs.check.outputs.virgl_ver }}
      PATCH_SHA: ${{ needs.check.outputs.patch_sha }}
      QEMU_VER:  ${{ needs.check.outputs.qemu_ver }}
      TAG:       ${{ needs.check.outputs.tag }}
    steps:
      - name: Download all .debs
        uses: actions/download-artifact@v4
        with:
          pattern: debs-*
          path: debs
          merge-multiple: true

      - name: List artifacts
        run: ls -la debs/*.deb

      - name: Publish release
        env:
          GH_TOKEN: ${{ github.token }}
        run: |
          set -euo pipefail
          cd debs

          api=https://api.github.com/repos/${GITHUB_REPOSITORY}/releases
          uploads=https://uploads.github.com/repos/${GITHUB_REPOSITORY}/releases

          # Look up existing release for this tag (404 is expected on first build)
          tmpf=$(mktemp)
          code=$(curl -sL -o "$tmpf" -w '%{http_code}' \
            -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            "${api}/tags/${TAG}")
          if [[ "$code" == "200" ]]; then
            old_id=$(jq -r .id "$tmpf")
            echo "Deleting existing release ${old_id}..."
            curl -sf -X DELETE -H "Authorization: token ${GH_TOKEN}" "${api}/${old_id}"
          elif [[ "$code" != "404" ]]; then
            echo "Unexpected HTTP $code from release lookup:"
            cat "$tmpf"; exit 1
          fi
          rm -f "$tmpf"

          body=$(cat <<EOB
          Proxmox VE 9 (trixie) drm_native_context enablement.

          - virglrenderer ${VIRGL_VER} with the xe-native-context patch
          - pve-qemu-kvm ${QEMU_VER} rebuilt to link the above (so native context
            is compiled in instead of stubbed out against Debian's virglrenderer)

          Upstream:
          - https://gitlab.freedesktop.org/virgl/virglrenderer/-/tags/${VIRGL_VER}
          - https://github.com/cmspam/xe-native-context-enablement/blob/${PATCH_SHA}/virglrenderer-xe-native-context.patch
          - https://git.proxmox.com/git/pve-qemu.git

          drm-renderers: amdgpu, panfrost, asahi, msm, i915, xe; plus venus, video, sysprof.

          Install on the Proxmox host:

              curl -fsSL https://raw.githubusercontent.com/${GITHUB_REPOSITORY}/main/install.sh | sudo bash
          EOB
          )

          payload=$(jq -nc \
            --arg tag "$TAG" \
            --arg name "$TAG" \
            --arg body "$body" \
            '{tag_name:$tag, name:$name, body:$body, draft:false, prerelease:false}')

          rel=$(curl -sfL -X POST -H "Authorization: token ${GH_TOKEN}" \
            -H "Accept: application/vnd.github+json" \
            -d "$payload" "${api}")
          rid=$(echo "$rel" | jq -r .id)
          echo "Release id: $rid"

          for f in *.deb; do
            echo "Uploading $f..."
            curl -sfL -X POST -H "Authorization: token ${GH_TOKEN}" \
              -H "Content-Type: application/x-debian-package" \
              --data-binary @"$f" \
              "${uploads}/${rid}/assets?name=$(basename "$f")" >/dev/null
          done

          echo "Released: ${TAG}"
